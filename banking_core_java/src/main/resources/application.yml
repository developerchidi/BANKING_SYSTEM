spring:
  application:
    name: banking_core_java
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/banking_system}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
